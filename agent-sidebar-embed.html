<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent 输入框升级 · Demo（技能在加号内）</title>
<style>
  :root {
    --bg-sidebar: #f7f7f7;
    --bg-card: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #8c8c8c;
    --text-muted: #b0b0b0;
    --border: #e8e8e8;
    --border-soft: #eeeeee;
    --green: #1faf68;
    --green-soft: #e6f7f0;
    --blue: #3b82f6;
    --shadow-card: 0 1px 4px rgba(0,0,0,.06);
    --shadow-float: 0 4px 18px rgba(0,0,0,.14);
    --sidebar-w: 360px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
    background: #E9E9F0;
    color: var(--text);
    overflow: hidden;
  }
  button { font-family: inherit; border: none; background: none; cursor: pointer; }
  /* .app redefined below for WPS chrome */

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    background: #E9E9F0;
    overflow: hidden;
    padding: 0;
  }
  .app-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #fff;
    border: 1px solid rgba(209,213,219,.8);
    border-radius: 12px 12px 0 0;
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
    overflow: hidden;
    margin: 0;
  }

  /* 窗口文件标签栏 — 对齐 WPS-demo WpsWindowTabs */
  .win-tabs {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #E9E9F0;
    padding: 0 14px;
    border-bottom: 1px solid rgba(229,231,235,.4);
    flex-shrink: 0;
    user-select: none;
  }
  .win-tabs-left { display: flex; align-items: center; gap: 16px; height: 100%; }
  .wps-logo { display: flex; align-items: center; gap: 6px; }
  .wps-logo-mark {
    width: 22px; height: 22px; border-radius: 4px;
    background: #F14624; color: #fff; font-weight: 900; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .wps-logo-text { font-size: 12px; font-weight: 700; color: #E23F27; }
  .file-tabs { display: flex; align-items: center; gap: 4px; height: 100%; }
  .file-tab-item {
    display: flex; align-items: center; gap: 8px;
    height: 30px; padding: 0 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600; color: #374151;
    background: #DBDBE3; cursor: default;
  }
  .file-tab-item.active { background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  .file-tab-icon {
    width: 16px; height: 16px; border-radius: 3px;
    background: #1FAF68; color: #fff; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .demo-badge {
    font-size: 11px; color: #888; background: #fff;
    border: 1px dashed #ccc; padding: 2px 8px; border-radius: 4px;
  }

  .main { flex: 1; display: flex; min-height: 0; width: 100%; }

  /* ===== 表格区 ===== */
  .sheet-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #fff;
  }

  /* 菜单栏 — WpsMenuBar */
  .menu-bar {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #E9E9F0;
    padding: 0 12px;
    border-bottom: 1px solid rgba(229,231,235,.4);
    flex-shrink: 0;
    user-select: none;
  }
  .menu-bar-left { display: flex; align-items: center; gap: 6px; height: 100%; }
  .btn-file {
    display: flex; align-items: center; gap: 6px;
    background: #1FAF68; color: #fff; border-radius: 4px;
    padding: 4px 12px; font-size: 12px; font-weight: 700;
  }
  .btn-file:hover { background: #1A9C54; }
  .autosave {
    display: flex; align-items: center; gap: 4px;
    border-right: 1px solid #d1d5db; padding-right: 8px; margin-right: 4px; height: 24px;
  }
  .autosave span { font-size: 10px; color: #6b7280; font-weight: 600; }
  .toggle {
    width: 28px; height: 16px; border-radius: 999px; background: #9ca3af; position: relative;
  }
  .toggle::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; border-radius: 50%; background: #fff;
  }
  .quick-tools {
    display: flex; align-items: center; gap: 2px;
    border-right: 1px solid #d1d5db; padding-right: 8px; margin-right: 6px; height: 24px; color: #6b7280;
  }
  .quick-tools button {
    padding: 4px; border-radius: 4px; color: inherit;
    display: flex; align-items: center;
  }
  .quick-tools button:hover { background: #e5e7eb; color: #374151; }
  .quick-tools svg { width: 16px; height: 16px; }
  .menu-nav { display: flex; align-items: center; height: 100%; }
  .menu-nav button {
    position: relative; height: 100%; padding: 0 12px;
    font-size: 12px; font-weight: 600; color: #4b5563;
  }
  .menu-nav button:hover { background: rgba(229,231,235,.5); color: #111; }
  .menu-nav button.active { color: #1FAF68; font-weight: 700; }
  .menu-nav button.active::after {
    content: ""; position: absolute; left: 10px; right: 10px; bottom: 0;
    height: 2.5px; border-radius: 999px; background: #1FAF68;
  }
  .menu-sep { color: #d1d5db; margin: 0 6px; font-size: 12px; }
  .menu-ai {
    display: flex; align-items: center; gap: 2px; height: 100%; padding: 0 12px;
    font-size: 12px; font-weight: 700;
    background: linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .menu-bar-right { display: flex; align-items: center; gap: 12px; }
  .cloud-status { display: flex; align-items: center; gap: 4px; color: #6b7280; font-size: 10px; }
  .btn-share {
    display: flex; align-items: center; gap: 4px;
    background: #1FAF68; color: #fff; border-radius: 999px;
    padding: 4px 12px; font-size: 10px; font-weight: 700;
  }
  .ai-entry {
    width: 28px; height: 28px; padding: 0; margin: 0;
    border: none !important; background: transparent !important;
    outline: none; box-shadow: none !important;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer; border-radius: 0 !important;
  }
  .ai-entry:hover { transform: scale(1.06); opacity: .9; background: transparent !important; }
  .ai-entry:focus { outline: none; background: transparent !important; }
  .ai-entry img {
    width: 28px; height: 28px;
    display: block; object-fit: contain;
    background: transparent !important;
    border: none !important; border-radius: 0 !important;
    box-shadow: none !important;
  }

  /* 功能区 — WpsRibbon 简化还原 */
  .ribbon-wrap {
    background: #E9E9F0; padding: 2px 10px 8px; flex-shrink: 0; user-select: none;
  }
  .ribbon-panel {
    height: 80px; background: #fff; border: 1px solid rgba(229,231,235,.8);
    border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.04);
    display: flex; align-items: stretch; padding: 4px 12px;
    overflow-x: auto; gap: 0;
  }
  .rb-group {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 4px 12px;
    border-right: 1px solid #f3f4f6; flex-shrink: 0; min-width: 0;
  }
  .rb-group:last-child { border-right: none; }
  .rb-body { flex: 1; display: flex; align-items: center; gap: 6px; }
  .rb-big {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 52px; height: 60px; border-radius: 12px; color: #4b5563; font-size: 11px; font-weight: 600;
  }
  .rb-big:hover { background: #f3f4f6; }
  .rb-big svg { width: 22px; height: 22px; color: #6b7280; margin-bottom: 4px; }
  .rb-row { display: flex; align-items: center; gap: 4px; }
  .rb-col { display: flex; flex-direction: column; gap: 4px; justify-content: center; }
  .rb-dd {
    display: flex; align-items: center; height: 26px;
    border: 1px solid #d1d5db; background: #fff; border-radius: 8px;
    padding: 0 8px; gap: 4px; font-size: 12px; font-weight: 600; color: #4b5563;
  }
  .rb-ico {
    padding: 4px; border-radius: 4px; color: #374151;
    display: flex; align-items: center; justify-content: center;
  }
  .rb-ico:hover { background: #f3f4f6; }
  .rb-ico svg { width: 16px; height: 16px; }
  .rb-mini {
    display: flex; align-items: center; gap: 4px;
    padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; color: #4b5563;
  }
  .rb-mini:hover { background: #f3f4f6; }
  .rb-mini svg { width: 14px; height: 14px; }

  /* 公式栏 */
  .formula-bar {
    height: 40px; display: flex; align-items: center; gap: 10px;
    background: #E9E9F0; padding: 0 12px 8px; flex-shrink: 0; user-select: none;
  }
  .name-box {
    width: 96px; height: 30px; background: #fff; border: 1px solid #d1d5db;
    border-radius: 8px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px; font-size: 12px; font-weight: 700; color: #374151; box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .name-box svg { width: 14px; height: 14px; color: #9ca3af; }
  .formula-input-wrap {
    flex: 1; height: 30px; display: flex; align-items: center;
    background: #fff; border: 1px solid #d1d5db; border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04); overflow: hidden;
  }
  .formula-fx {
    display: flex; align-items: center; gap: 4px; padding: 0 12px; color: #9ca3af; flex-shrink: 0;
  }
  .formula-fx .fx { font-family: Georgia, serif; font-style: italic; font-weight: 700; font-size: 13px; color: #6b7280; }
  .formula-sep { width: 1px; height: 16px; background: #e5e7eb; flex-shrink: 0; }
  .formula-input {
    flex: 1; height: 100%; border: none; outline: none; padding: 0 12px;
    font-size: 13px; font-weight: 600; color: #1f2937; background: transparent;
  }

  .grid-wrap {
    flex: 1; overflow: auto; position: relative; background: #fff; width: 100%;
  }
  table.grid {
    border-collapse: collapse; table-layout: fixed; user-select: none; width: 100%; min-width: 100%;
  }
  .grid th, .grid td {
    border: 1px solid #e5e7eb; height: 24px; font-size: 12px;
    text-align: left; padding: 0 6px; white-space: nowrap; overflow: hidden;
  }
  .grid th {
    background: #f5f5f5; color: #666; font-weight: 500; text-align: center;
    position: sticky; top: 0; z-index: 2;
  }
  .grid th.row-h, .grid td.row-h {
    width: 40px; min-width: 40px; max-width: 40px; background: #f5f5f5;
    text-align: center; color: #888; position: sticky; left: 0; z-index: 3;
  }
  .grid th.row-h { z-index: 4; }
  .grid td { cursor: cell; background: #fff; }
  .grid td.selected {
    background: #d4edda !important; outline: 2px solid #1FAF68;
    outline-offset: -2px; position: relative; z-index: 1;
  }
  .grid td.header-row { font-weight: 600; background: #fafafa; }

  .selection-float {
    position: absolute; z-index: 20; display: none;
    pointer-events: none;
  }
  .selection-float.show { display: flex; }
  .selection-float button {
    pointer-events: auto;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,.96);
    color: #1FAF68;
    border: 1px solid rgba(31,175,104,.45);
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
    padding: 0;
    position: relative;
  }
  .selection-float button:hover {
    background: #1FAF68; color: #fff;
    border-color: #1FAF68;
    box-shadow: 0 2px 8px rgba(31,175,104,.28);
  }
  .selection-float svg { width: 13px; height: 13px; }
  .selection-float .float-tip {
    position: absolute;
    left: calc(100% + 6px);
    top: 50%;
    transform: translateY(-50%);
    background: #4a4a4a;
    color: #fff;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .12s;
  }
  .selection-float button:hover .float-tip { opacity: 1; }

  /* 表格右键菜单 */
  .ctx-menu {
    position: fixed; z-index: 80; display: none; min-width: 168px;
    background: #fff; border-radius: 8px; box-shadow: var(--shadow-float);
    border: 1px solid #e5e5e5; padding: 4px;
  }
  .ctx-menu.show { display: block; }
  .ctx-menu button {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px 10px; border-radius: 6px; font-size: 13px; color: #333; text-align: left;
  }
  .ctx-menu button:hover { background: #f5f5f5; }
  .ctx-menu button:disabled { color: #bbb; cursor: not-allowed; }
  .ctx-menu button:disabled:hover { background: transparent; }
  .ctx-menu svg { width: 15px; height: 15px; color: #666; flex-shrink: 0; }
  .ctx-sep { height: 1px; background: #eee; margin: 4px 6px; }

  /* Sheet tabs */
  .sheet-tabs {
    height: 32px; display: flex; align-items: center; justify-content: space-between;
    background: #F3F3F3; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb;
    padding: 0 8px; flex-shrink: 0; font-size: 12px; user-select: none;
  }
  .sheet-tabs-left { display: flex; align-items: flex-end; height: 100%; }
  .sheet-nav {
    display: flex; align-items: center; gap: 2px; border-right: 1px solid #d1d5db;
    padding-right: 6px; margin-right: 6px; height: 24px; align-self: center; color: #6b7280;
  }
  .sheet-nav button { padding: 2px; border-radius: 4px; display: flex; }
  .sheet-nav button:hover { background: #e5e7eb; }
  .sheet-tab {
    position: relative; height: 27px; padding: 0 16px;
    display: flex; align-items: center; color: #6b7280; border: 1px solid transparent; border-bottom: none;
  }
  .sheet-tab:hover { background: rgba(229,231,235,.5); color: #374151; }
  .sheet-tab.active {
    background: #fff; color: #1f2937; font-weight: 600;
    border-color: #d1d5db; border-radius: 4px 4px 0 0; box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .sheet-tab.active::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 2.5px; background: #1FAF68;
  }
  .sheet-add {
    margin-left: 4px; align-self: center; padding: 4px; border-radius: 999px; color: #6b7280;
  }
  .sheet-add:hover { background: #e5e7eb; }
  .sheet-sel-info { font-size: 10px; color: #9ca3af; padding-right: 8px; }

  /* 状态栏 */
  .status-bar {
    height: 24px; display: flex; align-items: center; justify-content: space-between;
    background: #F5F5F5; border-top: 1px solid #e5e7eb; padding: 0 12px;
    font-size: 10px; color: #6b7280; flex-shrink: 0; user-select: none;
  }
  .status-left { display: flex; align-items: center; gap: 12px; }
  .status-right { display: flex; align-items: center; gap: 12px; }
  .zoom-ctrl { display: flex; align-items: center; gap: 6px; }
  .zoom-track { width: 64px; height: 4px; background: #d1d5db; border-radius: 999px; position: relative; }
  .zoom-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 33%; background: #1FAF68; border-radius: 999px; }
  .zoom-thumb {
    position: absolute; top: 50%; left: 33%; transform: translate(-50%,-50%);
    width: 10px; height: 10px; border-radius: 50%; background: #fff; border: 1px solid #9ca3af;
  }

  /* ===== 侧边栏 ===== */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    border-left: 1px solid #e5e5e5;
  }
  .sidebar.hidden { display: none; }

  .sb-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 12px 16px 0;
    flex-shrink: 0;
  }
  .sb-title { font-size: 15px; font-weight: 700; color: #1f1f1f; line-height: 1.25; }
  .sb-sub { font-size: 11px; color: #9a9a9a; margin-top: 2px; }
  .sb-actions { display: flex; gap: 0; margin-top: -2px; }
  .sb-icon-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; color: #a0a0a0;
  }
  .sb-icon-btn:hover { background: rgba(0,0,0,.05); color: #666; }
  .sb-icon-btn svg { width: 16px; height: 16px; }

  .sb-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }
  /* 浮层打开时禁止侧栏滚动，避免与面板内滚动条叠成双滚动/遮挡 */
  .sb-body.menu-open {
    overflow: hidden;
  }

  .sb-center {
    display: flex;
    flex-direction: column;
    width: 100%;
    flex-shrink: 0;
    padding: 12px 0 24px;
    overflow: visible;
    position: relative;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 0 16px;
    flex-shrink: 0;
  }
  .brand-logo {
    width: 40px; height: 40px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    display: block;
  }
  .brand-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .brand-text { font-size: 16px; font-weight: 700; color: #1a1a1a; letter-spacing: 0.2px; }

  /* 输入框 */
  .input-card {
    background: var(--bg-card);
    border-radius: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    border: 1px solid #ebebeb;
    padding: 14px 14px 10px;
    flex-shrink: 0;
    position: relative;
    overflow: visible;
  }

  .chip-bar {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .chip-bar.has-chips { display: flex; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    max-width: 100%;
    padding: 5px 6px 5px 8px;
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 12px;
    color: #374151;
    line-height: 1.3;
    cursor: grab;
    user-select: none;
    touch-action: none;
    transition: opacity 0.15s ease, box-shadow 0.15s ease;
  }
  .chip.is-dragging {
    opacity: 0.45;
    cursor: grabbing;
    z-index: 2;
    box-shadow: 0 4px 12px rgba(0,0,0,.12);
  }
  .chip.selection { background: #eef8f2; border-color: #c6e9d5; color: #166534; }
  .chip.attachment { background: #f0f4ff; border-color: #d4ddff; color: #3730a3; }
  .chip.ref { background: #f0f4ff; border-color: #d4ddff; color: #3730a3; }
  .chip.screenshot { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
  .chip-thumb {
    width: 28px; height: 22px;
    border-radius: 3px;
    background: linear-gradient(135deg, #dbeafe, #fce7f3);
    flex-shrink: 0;
    border: 1px solid #e5e5e5;
  }
  .chip-meta { display: flex; flex-direction: column; min-width: 0; }
  .chip-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 160px;
  }
  .chip-sub { font-size: 10px; color: #999; }
  .chip-x {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    color: inherit;
    opacity: .5;
    flex-shrink: 0;
    margin-left: 2px;
  }
  .chip-x:hover { opacity: 1; background: rgba(0,0,0,.08); }

  .input-area { min-height: 48px; max-height: 110px; overflow-y: auto; }
  .input-area textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    background: transparent;
    min-height: 44px;
    font-family: inherit;
  }
  .input-area textarea::placeholder { color: var(--text-muted); }

  .input-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .toolbar-left, .toolbar-right {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .tool-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: #6b7280;
    position: relative;
  }
  .tool-btn[hidden] { display: none !important; }
  .tool-btn:hover { background: #f3f4f6; color: #374151; }
  .tool-btn.active { background: #eef8f2; color: var(--green); }
  .tool-btn.mic-active { background: #f3f4f6; }
  .tool-btn svg { width: 16px; height: 16px; }
  .divider-v { width: 1px; height: 14px; background: #e5e5e5; margin: 0 4px; }
  .send-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #e5e5e5;
    color: #fff;
    transition: background .15s, transform .1s;
  }
  .send-btn.enabled { background: #1a1a1a; cursor: pointer; }
  .send-btn.enabled:hover { background: #333; }
  .send-btn.enabled:active { transform: scale(.95); }
  .send-btn:disabled { cursor: not-allowed; }
  .send-btn svg { width: 14px; height: 14px; }

  /* Tooltip */
  .tip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #4a4a4a;
    color: #fff;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity .12s;
    z-index: 40;
  }
  .tip::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #4a4a4a;
  }
  .tool-btn:hover .tip,
  .tool-btn.show-tip .tip { opacity: 1; }

  /* 加号菜单项悬浮说明（对齐图1：深色 tip） */
  .menu-tip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: #3a3a3a;
    color: #fff;
    font-size: 12px;
    line-height: 1.45;
    padding: 8px 10px;
    border-radius: 6px;
    white-space: normal;
    width: max-content;
    max-width: 260px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .12s;
    z-index: 50;
    box-shadow: 0 4px 12px rgba(0,0,0,.18);
  }
  .menu-item:hover .menu-tip { opacity: 1; }

  /* 通用浮层菜单 */
  .menu {
    position: absolute;
    background: #fff;
    border-radius: 10px;
    box-shadow: var(--shadow-float);
    border: 1px solid #e5e5e5;
    padding: 4px;
    z-index: 35;
    display: none;
    min-width: 168px;
  }
  .menu.show { display: block; }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 10px;
    border-radius: 7px;
    font-size: 13px;
    color: #333;
    text-align: left;
    position: relative;
  }
  .menu-item:hover { background: #f5f5f5; }
  .menu-item.selected { background: #f0f7ff; }
  .menu-item svg { width: 18px; height: 18px; color: #666; flex-shrink: 0; }
  .menu-item .check {
    margin-left: auto;
    color: var(--blue);
    font-size: 14px;
    width: 16px;
    text-align: center;
  }
  .menu-item .check:empty { visibility: hidden; }
  .menu-item:disabled { color: #bbb; cursor: not-allowed; }
  .menu-item:disabled:hover { background: transparent; }
  .menu-item:disabled svg { color: #ccc; }
  .menu-item .item-sub {
    display: block; font-size: 11px; color: #999; margin-top: 1px; font-weight: 400;
  }
  .menu-item .item-main { display: flex; flex-direction: column; align-items: flex-start; min-width: 0; }
  .menu-sep-line { height: 1px; background: #eee; margin: 4px 6px; }

  #uploadMenu { bottom: calc(100% - 4px); left: 0; overflow: visible; }
  #voiceMenu { bottom: calc(100% + 4px); right: 36px; }
  #skillPanel {
    bottom: calc(100% + 6px);
    left: 0;
    right: auto;
    width: 240px; /* 定宽，对齐建表技能菜单，勿拉满侧栏 */
    max-width: calc(100% - 16px);
    min-width: 0;
    padding: 8px 0;
    max-height: none;
    overflow: hidden; /* 只让列表滚 */
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.10);
    z-index: 42;
  }
  #skillPanel .sm-search {
    display: block;
    margin: 0 10px 6px;
    padding: 7px 10px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    font-size: 12px;
    width: calc(100% - 20px);
    outline: none;
    color: #333;
    box-sizing: border-box;
  }
  #skillPanel .sm-search:focus { border-color: #4d8cf5; }
  #skillPanel .sm-label {
    padding: 6px 14px 4px;
    font-size: 11px;
    color: #999;
  }
  #skillPanel .skill-list {
    max-height: 216px; /* 约 5～6 条，侧栏比建表更矮 */
    overflow-y: auto;
    overscroll-behavior: contain;
  }
  #skillPanel .skill-empty {
    display: none;
    padding: 12px 14px;
    font-size: 12px;
    color: #999;
    text-align: center;
  }
  #skillPanel.is-empty .skill-empty { display: block; }
  #skillPanel.is-empty .skill-list { display: none; }
  /* @ 引用：Cursor 同框下钻；点击进入二级高面板 */
  #atPanel {
    bottom: calc(100% + 6px);
    left: 0;
    right: auto;
    width: 200px;
    min-width: 0;
    max-width: none;
    padding: 8px 6px 10px;
    overflow: hidden;
  }
  #atPanel.drill-mode {
    width: 240px; /* 二级列表略宽，方便文件名 */
    max-height: min(300px, calc(100vh - 220px)); /* 整体限高，避免顶到侧栏标题被裁切 */
  }
  #atPrimaryCol { width: 100%; }
  #atPanel .at-list-wrap {
    max-height: none;
    overflow: visible;
  }
  #atPanel.drill-mode .at-list-wrap {
    max-height: min(240px, calc(100vh - 260px));
    overflow-y: auto;
  }
  #atFlyout { display: none !important; } /* 不再用并排飞出 */
  #atPanel .at-ftype {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #atPanel .at-ftype svg { width: 18px; height: 18px; display: block; }
  #atPanel .at-ftype.sheet { background: #e8f8ef; }
  #atPanel .at-ftype.doc { background: #e8f1ff; }
  #atPanel .at-ftype.otl { background: #f3e8ff; }
  #atPanel .at-ftype.chat {
    background: linear-gradient(145deg, #f0e9ff, #e8f7f2);
    border: 1px solid #e4ddf7;
  }
  #atPanel .at-sep {
    height: 1px;
    background: #eee;
    margin: 6px 4px;
  }
  #atPanel .at-title {
    font-size: 12px; font-weight: 600; color: #888;
    padding: 4px 8px 8px; letter-spacing: 0.2px;
    display: flex; align-items: center; gap: 6px;
  }
  #atPanel .at-back {
    border: 0; background: transparent; color: #666;
    font-size: 16px; cursor: pointer; padding: 0 2px; line-height: 1;
  }
  #atPanel .at-back:hover { color: #111; }
  #atPanel .at-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 9px 10px; border-radius: 8px;
    font-size: 13px; color: #333; text-align: left;
  }
  #atPanel .at-item:hover { background: #f3f4f6; }
  #atPanel .at-item.is-active {
    background: #f0f0f0;
  }
  #atPanel .at-item.is-active:hover { background: #e8e8e8; }
  #atPanel .at-sheet-search {
    width: 100%;
    box-sizing: border-box;
    margin: 0 0 6px;
    padding: 7px 10px;
    border: 1px solid #4d8cf5;
    border-radius: 8px;
    font-size: 12px;
    outline: none;
    font-family: inherit;
  }
  #atPanel .at-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: #1FAF68; color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  #atPanel .at-icon.sheet { background: #3b82f6; }
  #atPanel .at-icon.chat { background: #8b5cf6; }
  #atPanel .at-icon.folder { background: #64748b; }
  #atPanel .at-meta { min-width: 0; flex: 1; }
  #atPanel .at-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px;
  }
  #atPanel .at-name-main {
    font-size: 13px; line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #atPanel .at-name-sheet {
    font-size: 11px; color: #999; margin-top: 2px; line-height: 1.2;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #atPanel .at-sub { font-size: 11px; color: #999; margin-top: 1px; }
  #atPanel .at-enter {
    color: #bbb; font-size: 14px; flex-shrink: 0; margin-right: 2px;
  }
  #atPanel .at-item:hover .at-enter { color: #888; }
  #atPanel .at-return {
    color: #bbb; font-size: 13px; flex-shrink: 0; opacity: 0;
  }
  #atPanel .at-item:hover .at-return { opacity: 1; color: #888; }
  /* 技能项：对齐建表面板（彩色角标 + 扁平行） */
  #skillPanel .skill-list { display: block; }
  #skillPanel .skill-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-radius: 0;
    border: none;
    font-size: 13px;
    color: #333;
    text-align: left;
    width: 100%;
    background: transparent;
  }
  #skillPanel .skill-item:hover { background: #f0f5ff; }
  #skillPanel .skill-badge {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0; color: #fff;
  }
  #skillPanel .skill-badge.blue { background: #4d8cf5; }
  #skillPanel .skill-badge.purple { background: #9b7ed8; }
  #skillPanel .skill-badge.orange { background: #f5a623; }
  #skillPanel .skill-badge.green { background: #4caf50; }
  #skillPanel .skill-badge.red { background: #e57373; }
  #skillPanel .skill-badge.teal { background: #26a69a; }
  #skillPanel .skill-badge.cyan { background: #00acc1; }

  /* Tabs：与输入框拉开间距 */
  .tabs {
    display: flex;
    margin-top: 36px;
    margin-bottom: 10px;
    border-bottom: 1px solid #ececec;
    flex-shrink: 0;
    padding: 0 2px;
  }
  .tab {
    flex: 1;
    padding: 10px 0 9px;
    font-size: 12px;
    color: #8c8c8c;
    text-align: center;
    position: relative;
    white-space: nowrap;
  }
  .tab:hover { color: #555; }
  .tab.active { color: var(--green); font-weight: 600; }
  .tab.active::after {
    content: "";
    position: absolute;
    left: 22%; right: 22%;
    bottom: -1px;
    height: 2px;
    background: var(--green);
    border-radius: 1px;
  }

  .prompt-list { display: flex; flex-direction: column; gap: 8px; }
  .prompt-card {
    width: 100%;
    text-align: left;
    padding: 13px 14px;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    font-size: 12px;
    color: #3d3d3d;
    line-height: 1.55;
  }
  .prompt-card:hover {
    border-color: #c6e9d5;
    box-shadow: 0 2px 8px rgba(31,175,104,.08);
  }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: rgba(30,30,30,.92);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    z-index: 100;
    max-width: 520px;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .log-panel {
    position: fixed;
    left: 12px;
    bottom: 12px;
    width: 300px;
    max-height: 150px;
    background: #1e1e1e;
    color: #a5d6a7;
    font-family: Consolas, Monaco, monospace;
    font-size: 11px;
    border-radius: 8px;
    padding: 10px 12px;
    overflow: auto;
    z-index: 50;
    box-shadow: var(--shadow-float);
    display: none;
  }
  .log-panel.show { display: block; }
  .log-panel .log-title { color: #888; margin-bottom: 6px; font-size: 10px; }
  .log-panel pre { white-space: pre-wrap; word-break: break-all; margin: 0; }

</style>

  /**
   * 已添加芯片拖拽重排（与建表面板同构）
   */
  function enableChipBarReorder() {
    if (!chipBar || chipBar._chipReorderBound) return;
    chipBar._chipReorderBound = true;
    const chipSelector = ".chip";
    const excludeSel = ".chip-x";
    const threshold = 5;
    let dragEl = null;
    let started = false;
    let startX = 0;
    let startY = 0;
    let pointerId = null;

    function listChips() {
      return Array.from(chipBar.querySelectorAll(chipSelector));
    }

    function flipMove(drag, placeBeforeNode) {
      const chipsEl = listChips();
      const beforeRects = new Map(chipsEl.map((n) => [n, n.getBoundingClientRect()]));
      if (placeBeforeNode) chipBar.insertBefore(drag, placeBeforeNode);
      else chipBar.appendChild(drag);
      listChips().forEach((n) => {
        if (n === drag) return;
        const b = beforeRects.get(n);
        if (!b) return;
        const a = n.getBoundingClientRect();
        const dx = b.left - a.left;
        const dy = b.top - a.top;
        if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
        n.style.transition = "none";
        n.style.transform = "translate(" + dx + "px," + dy + "px)";
        requestAnimationFrame(() => {
          n.style.transition = "transform 0.18s ease";
          n.style.transform = "";
        });
      });
    }

    function reorderAgainstPointer(clientX, clientY) {
      if (!dragEl) return;
      const others = listChips().filter((c) => c !== dragEl);
      if (!others.length) return;
      let target = null;
      let placeBefore = true;
      for (let i = 0; i < others.length; i++) {
        const c = others[i];
        const r = c.getBoundingClientRect();
        if (clientX >= r.left && clientX <= r.right && clientY >= r.top - 10 && clientY <= r.bottom + 10) {
          target = c;
          placeBefore = clientX < r.left + r.width / 2;
          break;
        }
      }
      if (!target) {
        const first = others[0].getBoundingClientRect();
        const last = others[others.length - 1].getBoundingClientRect();
        if (clientX < first.left) {
          target = others[0];
          placeBefore = true;
        } else if (clientX > last.right) {
          target = others[others.length - 1];
          placeBefore = false;
        }
      }
      if (!target) return;
      const next = placeBefore ? target : target.nextSibling;
      if (dragEl.nextSibling === next || dragEl === next) return;
      flipMove(dragEl, next);
    }

    function syncChipsOrderFromDom() {
      const ids = listChips().map((el) => el.dataset.id).filter(Boolean);
      const map = new Map(chips.map((c) => [c.id, c]));
      chips = ids.map((id) => map.get(id)).filter(Boolean);
    }

    function endDrag() {
      if (!dragEl) return;
      dragEl.classList.remove("is-dragging");
      if (pointerId != null && dragEl.releasePointerCapture) {
        try { dragEl.releasePointerCapture(pointerId); } catch (e) { /* ignore */ }
      }
      if (started) {
        syncChipsOrderFromDom();
        showToast("已调整顺序");
      }
      dragEl = null;
      started = false;
      pointerId = null;
      document.body.style.cursor = "";
      document.body.style.userSelect = "";
    }

    chipBar.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return;
      if (e.target.closest(excludeSel)) return;
      const chip = e.target.closest(chipSelector);
      if (!chip || !chipBar.contains(chip)) return;
      dragEl = chip;
      started = false;
      startX = e.clientX;
      startY = e.clientY;
      pointerId = e.pointerId;
      try { chip.setPointerCapture(e.pointerId); } catch (err) { /* ignore */ }
    });

    chipBar.addEventListener("pointermove", (e) => {
      if (!dragEl || (pointerId != null && e.pointerId !== pointerId)) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (!started) {
        if (Math.hypot(dx, dy) < threshold) return;
        started = true;
        dragEl.classList.add("is-dragging");
        document.body.style.cursor = "grabbing";
        document.body.style.userSelect = "none";
        e.preventDefault();
      }
      reorderAgainstPointer(e.clientX, e.clientY);
    });

    chipBar.addEventListener("pointerup", endDrag);
    chipBar.addEventListener("pointercancel", endDrag);
  }

      return '<span class="at-ftype chat" title="历史会话"><svg viewBox="0 0 24 24" fill="none"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7A2.5 2.5 0 0 1 17.5 16H10l-4 3.2V16H6.5A2.5 2.5 0 0 1 4 13.5v-7z" stroke="#7c3aed" stroke-width="1.8" fill="#f5f0ff"/><circle cx="9" cy="10" r="1" fill="#7c3aed"/><circle cx="12" cy="10" r="1" fill="#7c3aed"/><circle cx="15" cy="10" r="1" fill="#7c3aed"/></svg></span>';
    }
    if (it.ftype === "doc") {
      return '<span class="at-ftype doc" title="文字"><svg viewBox="0 0 24 24"><rect x="3" y="2" width="18" height="20" rx="3" fill="#3b82f6"/><text x="12" y="16" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="Arial,sans-serif">W</text></svg></span>';
    }
    if (it.ftype === "otl") {
      return '<span class="at-ftype otl" title="智能文档"><svg viewBox="0 0 24 24"><rect x="3" y="2" width="18" height="20" rx="3" fill="#8b5cf6"/><path d="M8 8h8M8 12h8M8 16h5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></span>';
    }
    return '<span class="at-ftype sheet" title="表格"><svg viewBox="0 0 24 24"><rect x="3" y="2" width="18" height="20" rx="3" fill="#22c55e"/><text x="12" y="16" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="Arial,sans-serif">S</text></svg></span>';
  }

  function setAtTitle(view) {
    if (view === "root") {
      atTitle.textContent = "引用";
      return;
    }
    const label = view === "sheets" ? "工作表" : (view === "recent" ? "最近" : "历史会话");
    atTitle.innerHTML = "";
    const back = document.createElement("button");
    back.type = "button";
    back.className = "at-back";
    back.setAttribute("aria-label", "返回");
    back.textContent = "‹";
    back.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      atView = "root";
      requestAnimationFrame(() => {
        renderAtPanel();
        atPanel.classList.add("show");
      });
    });
    const span = document.createElement("span");
    span.textContent = label;
    atTitle.appendChild(back);
    atTitle.appendChild(span);
  }

  function makeAtItem(it) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "at-item";
    if (it.id) btn.setAttribute("data-at-id", it.id);
    if (it.action === "drill") {
      let iconCls = "folder";
      let iconText = "近";
      if (it.id === "cat-chats") { iconCls = "chat"; iconText = "话"; }
      if (it.id === "cat-sheets") {
        const sheetName = it.sheetName || getActiveSheetName();
        btn.innerHTML =
          '<span class="at-icon sheet">表</span>' +
          '<span class="at-meta">' +
            '<div class="at-name-main">当前工作表</div>' +
            '<div class="at-name-sheet">' + sheetName + "</div>" +
          "</span>" +
          '<span class="at-enter">›</span>';
      } else {
        btn.innerHTML =
          '<span class="at-icon ' + iconCls + '">' + iconText + "</span>" +
          '<span class="at-meta"><div class="at-name">' + it.name + "</div></span>" +
          '<span class="at-enter">›</span>';
      }
      btn.addEventListener("click", (e) => {
        // 阻止冒泡：清空列表会销毁当前按钮，否则 document click 会误关面板
        e.preventDefault();
        e.stopPropagation();
        const next = it.drillTo;
        atView = next;
        requestAnimationFrame(() => {
          renderAtPanel();
          atPanel.classList.add("show");
        });
      });
    } else if (it.kind === "sheet") {
      const sheetName = it.sheetName || getActiveSheetName();
      const isActive = !!it.isActive;
      if (isActive) btn.classList.add("is-active");
      btn.innerHTML =
        '<span class="at-icon sheet">表</span>' +
        '<span class="at-meta"><div class="at-name">' + sheetName + "</div></span>" +
        (isActive ? '<span class="at-return" style="opacity:1;color:#1FAF68;font-size:11px;">当前</span>' : '<span class="at-return">↵</span>');
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        addAtChip({
          kind: "sheet",
          name: "工作表 · " + sheetName,
        });
      });
    } else if (it.kind === "chat") {
      btn.innerHTML =
        fileTypeIconHtml(it) +
        '<span class="at-meta"><div class="at-name">' + it.name + '</div>' +
        (it.sub ? '<div class="at-sub">' + it.sub + "</div>" : "") +
        "</span>" +
        '<span class="at-return">↵</span>';
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        addAtChip(it);
      });
    } else {
      btn.innerHTML =
        fileTypeIconHtml(it) +
        '<span class="at-meta"><div class="at-name">' + it.name + "</div></span>" +
        '<span class="at-return">↵</span>';
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        addAtChip(it);
      });
    }
    return btn;
  }

  function renderAtPanel() {
    setAtTitle(atView);
    atList.innerHTML = "";
    atList.onscroll = null;
    atPanel.classList.toggle("drill-mode", atView !== "root");
    hideAtFlyout();

    if (atView === "sheets") {
      const active = getActiveSheetName();
      const names = getWorkbookSheetNames();
      const search = document.createElement("input");
      search.className = "at-sheet-search";
      search.type = "text";
      search.placeholder = "请输入内容";
      search.addEventListener("click", (e) => e.stopPropagation());
      search.addEventListener("input", () => {
        const q = (search.value || "").trim().toLowerCase();
        atList.querySelectorAll(".at-item[data-sheet-name]").forEach((el) => {
          const n = (el.getAttribute("data-sheet-name") || "").toLowerCase();
          el.style.display = !q || n.indexOf(q) >= 0 ? "" : "none";
        });
      });
      atList.appendChild(search);
      names.forEach((name) => {
        const item = makeAtItem({
          kind: "sheet",
          sheetName: name,
          isActive: name === active,
        });
        item.setAttribute("data-sheet-name", name);
        atList.appendChild(item);
      });
      requestAnimationFrame(() => {
        const el = atList.querySelector(".at-item.is-active");
        if (el) el.scrollIntoView({ block: "nearest" });
      });
      return;
    }
    if (atView === "recent") {
      recentLoaded = 0;
      const renderPage = () => {
        const slice = ALL_RECENT_REFS.slice(recentLoaded, recentLoaded + RECENT_PAGE);
        slice.forEach((r) => atList.appendChild(makeAtItem(r)));
        recentLoaded += slice.length;
      };
      renderPage();
      atList.onscroll = () => {
        if (atView !== "recent") return;
        if (recentLoaded >= ALL_RECENT_REFS.length) return;
        if (atList.scrollTop + atList.clientHeight >= atList.scrollHeight - 24) renderPage();
      };
      return;
    }
    if (atView === "chats") {
      PAST_CHATS.forEach((r) => atList.appendChild(makeAtItem(r)));
      return;
    }

    atList.appendChild(makeAtItem({
      id: "cat-sheets",
      name: "当前工作表",
      sheetName: getActiveSheetName(),
      action: "drill",
      drillTo: "sheets",
    }));
    const sep = document.createElement("div");
    sep.className = "at-sep";
    atList.appendChild(sep);
    atList.appendChild(makeAtItem({
      id: "cat-recent",
      kind: "folder",
      name: "最近文件",
      action: "drill",
      drillTo: "recent",
    }));
    atList.appendChild(makeAtItem({
      id: "cat-chats",
      kind: "chatcat",
      name: "历史会话",
      action: "drill",
      drillTo: "chats",
    }));
  }

  function openAtPanel() {
    closeMenus("at");
    atView = "root";
    hideAtFlyout();
    renderAtPanel();
    atPanel.classList.add("show");
    triggerMode = "at";
    syncSbBodyMenuOpen();
  }

  function stripTrailingTrigger(ch) {
    const re = ch === "@" ? /(^|\s)@\S*$/ : /(^|\s)\/\S*$/;
    userInput.value = userInput.value.replace(re, "$1").replace(/\s+$/, "");
  }

  function detectTriggerFromInput() {
    const val = userInput.value;
    const caret = userInput.selectionStart != null ? userInput.selectionStart : val.length;
    const before = val.slice(0, caret);
    const atMatch = before.match(/(^|\s)@([^\s@/]*)$/);
    const slashMatch = before.match(/(^|\s)\/([^\s@/]*)$/);
    if (atMatch) {
      openAtPanel();
      return;
    }
    if (slashMatch) {
      openSkillPanel(true);
      return;
    }
    if (triggerMode === "at") atPanel.classList.remove("show");
    if (triggerMode === "slash") {
      skillPanel.classList.remove("show");
      btnSkill.classList.remove("active");
      skillPanel.classList.remove("is-empty");
      const list = skillPanel.querySelector(".skill-list");
      if (list) list.style.maxHeight = "";
      const search = document.getElementById("skillSearch");
      if (search) search.value = "";
      skillPanel.querySelectorAll(".skill-item").forEach((item) => { item.style.display = ""; });
    }
    triggerMode = null;
    syncSbBodyMenuOpen();
  }

  btnScreenshot.addEventListener("click", (e) => {
    e.stopPropagation();
    closeMenus();
    chips.push({
      id: "c" + chipIdSeq++,
      type: "screenshot",
      label: "截图 " + Date.now().toString().slice(-6),
      meta: { size: "120.83KB", source: "screenshot" },
    });
    if (!userInput.value.trim()) userInput.value = "总结图片的信息";
    renderChips();
    showToast("已截图并挂入对话");
    userInput.focus();
  });

  function syncMicChecks() {
    voiceMenu.querySelectorAll("[data-check]").forEach((el) => {
      el.textContent = el.dataset.check === micSource ? "✓" : "";
    });
    voiceMenu.querySelectorAll("[data-mic]").forEach((el) => {
      el.classList.toggle("selected", el.dataset.mic === micSource);
    });
  }
  syncMicChecks();

  function showVoiceMenu() {
    closeMenus("voice");
    voiceMenu.classList.add("show");
    btnMic.classList.add("mic-active");
    syncSbBodyMenuOpen();
  }
  function hideVoiceMenuSoon() {
    clearTimeout(voiceHoverTimer);
    voiceHoverTimer = setTimeout(() => {
      voiceMenu.classList.remove("show");
      btnMic.classList.remove("mic-active");
      syncSbBodyMenuOpen();
    }, 180);
  }

  btnMic.addEventListener("mouseenter", () => {
    clearTimeout(voiceHoverTimer);
    showVoiceMenu();
  });
  btnMic.addEventListener("mouseleave", hideVoiceMenuSoon);
  voiceMenu.addEventListener("mouseenter", () => clearTimeout(voiceHoverTimer));
  voiceMenu.addEventListener("mouseleave", hideVoiceMenuSoon);
  btnMic.addEventListener("click", (e) => {
    e.stopPropagation();
    if (voiceMenu.classList.contains("show")) {
      showToast("开始语音输入（" + (micSource === "phone" ? "手机麦克风" : "电脑麦克风") + "）· Demo");
    } else {
      showVoiceMenu();
    }
  });
  voiceMenu.querySelectorAll("[data-mic]").forEach((item) => {
    item.addEventListener("click", (e) => {
      e.stopPropagation();
      micSource = item.dataset.mic;
      syncMicChecks();
      showToast("已切换：" + (micSource === "phone" ? "手机麦克风" : "电脑麦克风"));
    });
  });

  document.addEventListener("click", (e) => {
    if (
      e.target.closest("#atFlyout") ||
      e.target.closest("#atPanel") ||
      e.target.closest("#skillPanel") ||
      e.target.closest("#uploadMenu") ||
      e.target.closest("#voiceMenu") ||
      e.target.closest("#inputCard")
    ) {
      // keep menus open
    } else {
      closeMenus();
    }
    if (!e.target.closest("#ctxMenu") && !e.target.closest("#gridWrap")) hideCtxMenu();
  });

  function hasSendableContent() {
    return userInput.value.trim().length > 0 || chips.length > 0;
  }
  function updateSendState() {
    const ok = hasSendableContent();
    btnSend.disabled = !ok;
    btnSend.classList.toggle("enabled", ok);
  }
  userInput.addEventListener("input", () => {
    updateSendState();
    detectTriggerFromInput();
  });
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeMenus();
      return;
    }
    if (e.key === "Enter" && !e.shiftKey) {
      if (atPanel.classList.contains("show") || skillPanel.classList.contains("show")) {
        return;
      }
      e.preventDefault();
      if (hasSendableContent()) doSend();
    }
  });

  function doSend() {
    const payload = {
      text: userInput.value.trim(),
      micSource,
      contextItems: chips.map((c) => {
        if (c.type === "selection") {
          return { type: "selection", sheet: c.meta.sheet, range: c.meta.range, label: c.label };
        }
        if (c.type === "screenshot") {
          return { type: "screenshot", name: c.label, size: c.meta.size };
        }
        if (c.type === "ref") {
          return { type: "ref", name: c.label, kind: c.meta.kind };
        }
        return { type: "attachment", name: c.label, source: c.meta.source };
      }),
    };
    console.log("[Agent Demo] send", payload);
    logPre.textContent = JSON.stringify(payload, null, 2);
    logPanel.classList.add("show");
    showToast("已发送（见左下角 payload）");
    userInput.value = "";
    chips = [];
    renderChips();
    updateSendState();
    closeMenus();
  }
  btnSend.addEventListener("click", doSend);

  function renderTabs() {
    tabsEl.innerHTML = "";
    Object.keys(SCENARIOS).forEach((key) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "tab" + (key === activeTab ? " active" : "");
      btn.textContent = SCENARIOS[key].label;
      btn.addEventListener("click", () => {
        activeTab = key;
        renderTabs();
        renderPrompts();
      });
      tabsEl.appendChild(btn);
    });
  }
  function renderPrompts() {
    promptList.innerHTML = "";
    SCENARIOS[activeTab].prompts.forEach((text) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "prompt-card";
      btn.textContent = text;
      btn.addEventListener("click", () => {
        userInput.value = text;
        updateSendState();
        userInput.focus();
      });
      promptList.appendChild(btn);
    });
  }

  inputCard.addEventListener("dragover", (e) => {
    e.preventDefault();
    inputCard.style.outline = "2px dashed " + getComputedStyle(document.documentElement).getPropertyValue("--green").trim();
  });
  inputCard.addEventListener("dragleave", () => { inputCard.style.outline = ""; });
  inputCard.addEventListener("drop", (e) => {
    e.preventDefault();
    inputCard.style.outline = "";
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
      addLocalFiles(e.dataTransfer.files);
    } else {
      openLocalFilePicker();
    }
  });

  buildGrid();
  renderTabs();
  renderPrompts();
  updateSendState();
  syncAiEntry();

  setTimeout(() => {
    selection = { r1: 1, c1: 0, r2: 4, c2: 4 };
    paintSelection(selection);
    placeFloat(selection);
  }, 300);
})();
</script>

<script id="agent-embed-bridge">
(function () {
  var embed = /(?:\?|&)embed=1(?:&|$)/.test(location.search || "");
  if (!embed) return;
  document.documentElement.classList.add("agent-embed");
  document.body.classList.add("agent-embed");

  function post(type, data) {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(Object.assign({ type: type }, data || {}), "*");
      }
    } catch (e) { /* ignore */ }
  }

  function getPayload() {
    var userInput = document.getElementById("userInput");
    var chipBar = document.getElementById("chipBar");
    var chips = [];
    if (chipBar) {
      chipBar.querySelectorAll(".chip").forEach(function (el) {
        var label = (el.querySelector(".chip-label") || el).textContent || "";
        chips.push({ label: label.trim() });
      });
    }
    return {
      text: ((userInput && userInput.value) || "").trim(),
      chips: chips
    };
  }

  function setInput(text) {
    var userInput = document.getElementById("userInput");
    if (!userInput) return;
    userInput.value = text || "";
    userInput.dispatchEvent(new Event("input", { bubbles: true }));
  }

  function clearInput() {
    setInput("");
    var chipBar = document.getElementById("chipBar");
    if (chipBar) {
      chipBar.innerHTML = "";
      chipBar.classList.remove("has-chips");
    }
  }

  window.addEventListener("message", function (e) {
    var d = e.data || {};
    if (d.type === "agent-sidebar-set-input") setInput(d.text || "");
    if (d.type === "agent-sidebar-clear") clearInput();
    if (d.type === "agent-sidebar-focus") {
      var el = document.getElementById("userInput");
      if (el) el.focus();
    }
    if (d.type === "agent-sidebar-get-input") {
      post("agent-sidebar-input-value", getPayload());
    }
    if (d.type === "agent-sidebar-sync-sheets") {
      if (window.AgentSidebarDemo && typeof window.AgentSidebarDemo.setWorkbookSheets === "function") {
        window.AgentSidebarDemo.setWorkbookSheets(d.sheets || [], d.active || "");
      }
    }
    if (d.type === "agent-sidebar-add-selection") {
      if (window.AgentSidebarDemo && typeof window.AgentSidebarDemo.addSelectionFromParent === "function") {
        window.AgentSidebarDemo.addSelectionFromParent(d);
      }
    }
  });

  function interceptSend(e) {
    e.preventDefault();
    e.stopImmediatePropagation();
    var payload = getPayload();
    if (!payload.text && !(payload.chips && payload.chips.length)) return;
    post("agent-sidebar-send", payload);
  }

  function bind() {
    var btnSend = document.getElementById("btnSend");
    var userInput = document.getElementById("userInput");
    var btnClose = document.getElementById("btnCloseSidebar");
    if (btnSend) btnSend.addEventListener("click", interceptSend, true);
    if (userInput) {
      userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          var at = document.getElementById("atPanel");
          var sk = document.getElementById("skillPanel");
          if ((at && at.classList.contains("show")) || (sk && sk.classList.contains("show"))) return;
          interceptSend(e);
        }
      }, true);
    }
    if (btnClose) {
      btnClose.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopImmediatePropagation();
        post("agent-sidebar-close");
      }, true);
    }
    post("agent-sidebar-ready");
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () { setTimeout(bind, 0); });
  } else {
    setTimeout(bind, 0);
  }
})();
</script>
